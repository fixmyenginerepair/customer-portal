    <script>
      if (
        typeof lucide !== "undefined" &&
        typeof lucide.createIcons === "function"
      ) {
        lucide.createIcons();
      }

      // ── STORAGE LAYER ──
      const Storage = {
        async get(key, fallback) {
          try {
            if (window.AppSDK && window.AppSDK.storage) {
              const val = await window.AppSDK.storage.get(key);
              if (val !== null && val !== undefined) return val;
            }
          } catch (e) {}
          try {
            const ls = localStorage.getItem("cp_" + key);
            if (ls !== null && ls !== undefined) return JSON.parse(ls);
          } catch (e) {}
          return fallback;
        },
        async set(key, val) {
          try {
            if (window.AppSDK && window.AppSDK.storage) {
              await window.AppSDK.storage.set(key, val);
            }
          } catch (e) {}
          try {
            localStorage.setItem("cp_" + key, JSON.stringify(val));
          } catch (e) {}
        },
      };

      // ── GLOBAL STATE ──
      let customers = [];
      let invoices = [];
      let repairs = [];
      let parts = [];
      let settings = {};
      let invoiceCounter = 1;
      let repairCounter = 1;
      let currentView = "dashboard";
      let filterCustomerId = null;

      // ── DATE HELPERS ──
      function formatDate(d) {
        if (!d) return "";
        const dt = new Date(d + "T00:00:00");
        return dt.toLocaleDateString("en-US", {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }
      function todayStr() {
        const d = new Date();
        return d.toISOString().split("T")[0];
      }
      function plus30() {
        const d = new Date();
        d.setDate(d.getDate() + 30);
        return d.toISOString().split("T")[0];
      }
      function fmtMoney(n) {
        return (
          "$" +
          Number(n || 0)
            .toFixed(2)
            .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
        );
      }
      function padInv(n) {
        return "INV-" + String(n).padStart(4, "0");
      }
      function padRep(n) {
        return "REP-" + String(n).padStart(4, "0");
      }
      function uid() {
        return (
          Date.now().toString(36) + Math.random().toString(36).substr(2, 6)
        );
      }

      // ── SCHEMA NORMALIZERS ──
      function normalizeCustomer(c) {
        if (!c || typeof c !== "object") return null;
        return {
          id: c.id || uid(),
          name: typeof c.name === "string" ? c.name.trim() : "",
          email: typeof c.email === "string" ? c.email.trim() : "",
          phone: typeof c.phone === "string" ? c.phone.trim() : "",
          company: typeof c.company === "string" ? c.company.trim() : "",
          address: typeof c.address === "string" ? c.address.trim() : "",
          notes: typeof c.notes === "string" ? c.notes.trim() : "",
          createdAt: c.createdAt || todayStr(),
          updatedAt: c.updatedAt || todayStr(),
        };
      }

      function normalizeInvoice(i) {
        if (!i || typeof i !== "object") return null;
        var lineItems = Array.isArray(i.lineItems)
          ? i.lineItems
              .map(function (li) {
                if (!li || typeof li !== "object") return null;
                var qty = Math.max(0, parseFloat(li.qty) || 0);
                var unitPrice = Math.max(0, parseFloat(li.unitPrice) || 0);
                var taxPct = Math.max(0, parseFloat(li.taxPct) || 0);
                var lineTotal = qty * unitPrice;
                return {
                  description:
                    typeof li.description === "string"
                      ? li.description.trim()
                      : "",
                  qty: qty,
                  unitPrice: unitPrice,
                  taxPct: taxPct,
                  lineTotal: lineTotal,
                };
              })
              .filter(Boolean)
          : [];
        var subtotal = lineItems.reduce(function (s, li) {
          return s + li.lineTotal;
        }, 0);
        var taxTotal = lineItems.reduce(function (s, li) {
          return s + li.lineTotal * (li.taxPct / 100);
        }, 0);
        var total = subtotal + taxTotal;
        var validStatuses = ["draft", "sent", "paid", "overdue"];
        return {
          id: i.id || uid(),
          invoiceNumber: i.invoiceNumber || "INV-????",
          customerId: i.customerId || "",
          status: validStatuses.includes(i.status) ? i.status : "draft",
          issueDate: i.issueDate || todayStr(),
          dueDate: i.dueDate || plus30(),
          lineItems: lineItems,
          subtotal: i.subtotal != null ? parseFloat(i.subtotal) : subtotal,
          taxTotal: i.taxTotal != null ? parseFloat(i.taxTotal) : taxTotal,
          total: i.total != null ? parseFloat(i.total) : total,
          notes: typeof i.notes === "string" ? i.notes.trim() : "",
          paymentTerms:
            typeof i.paymentTerms === "string" ? i.paymentTerms.trim() : "",
          paypalEmail:
            typeof i.paypalEmail === "string" ? i.paypalEmail.trim() : "",
          paypalLink:
            typeof i.paypalLink === "string" ? i.paypalLink.trim() : "",
          createdAt: i.createdAt || todayStr(),
          updatedAt: i.updatedAt || todayStr(),
        };
      }

      function normalizeRepair(r) {
        if (!r || typeof r !== "object") return null;
        var validStatuses = [
          "pending",
          "in-progress",
          "waiting-parts",
          "completed",
        ];
        return {
          id: r.id || uid(),
          repairNumber: r.repairNumber || "REP-????",
          customerId: r.customerId || "",
          invoiceId: r.invoiceId || "",
          partIds: Array.isArray(r.partIds)
            ? r.partIds.filter(function (id) {
                return typeof id === "string" && id;
              })
            : [],
          deviceType:
            typeof r.deviceType === "string" ? r.deviceType.trim() : "",
          issue: typeof r.issue === "string" ? r.issue.trim() : "",
          status: validStatuses.includes(r.status) ? r.status : "pending",
          receivedDate: r.receivedDate || todayStr(),
          estimatedCompletion: r.estimatedCompletion || plus30(),
          techNotes: typeof r.techNotes === "string" ? r.techNotes.trim() : "",
          estimatedCost: Math.max(0, parseFloat(r.estimatedCost) || 0),
          createdAt: r.createdAt || todayStr(),
          updatedAt: r.updatedAt || todayStr(),
        };
      }

      function normalizePart(p) {
        if (!p || typeof p !== "object") return null;
        var validStatuses = ["ordered", "in-transit", "received", "cancelled"];
        return {
          id: p.id || uid(),
          repairId: p.repairId || "",
          partName: typeof p.partName === "string" ? p.partName.trim() : "",
          partNumber:
            typeof p.partNumber === "string" ? p.partNumber.trim() : "",
          supplier: typeof p.supplier === "string" ? p.supplier.trim() : "",
          qty: Math.max(1, parseInt(p.qty) || 1),
          unitCost: Math.max(0, parseFloat(p.unitCost) || 0),
          status: validStatuses.includes(p.status) ? p.status : "ordered",
          orderedDate: p.orderedDate || todayStr(),
          expectedDate: p.expectedDate || plus30(),
          notes: typeof p.notes === "string" ? p.notes.trim() : "",
          createdAt: p.createdAt || todayStr(),
          updatedAt: p.updatedAt || todayStr(),
        };
      }

      function normalizeSettings(s) {
        var defaults = {
          businessName: "",
          businessEmail: "",
          businessPhone: "",
          businessAddress: "",
          defaultTaxRate: 0,
          defaultPaymentTerms: "Payment due within 30 days",
          paypalUsername: "",
        };
        if (!s || typeof s !== "object") return defaults;
        return {
          businessName:
            typeof s.businessName === "string"
              ? s.businessName.trim()
              : defaults.businessName,
          businessEmail:
            typeof s.businessEmail === "string"
              ? s.businessEmail.trim()
              : defaults.businessEmail,
          businessPhone:
            typeof s.businessPhone === "string"
              ? s.businessPhone.trim()
              : defaults.businessPhone,
          businessAddress:
            typeof s.businessAddress === "string"
              ? s.businessAddress.trim()
              : defaults.businessAddress,
          defaultTaxRate: Math.max(0, parseFloat(s.defaultTaxRate) || 0),
          defaultPaymentTerms:
            typeof s.defaultPaymentTerms === "string"
              ? s.defaultPaymentTerms.trim()
              : defaults.defaultPaymentTerms,
          paypalUsername:
            typeof s.paypalUsername === "string"
              ? s.paypalUsername.trim()
              : defaults.paypalUsername,
        };
      }

      // ── VALIDATORS (return null on pass, error string on fail) ──
      function validateCustomer(data, editId) {
        if (!data.name) return "Customer name is required.";
        if (!data.email) return "Email address is required.";
        var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRe.test(data.email))
          return "Please enter a valid email address.";
        var dup = (customers || []).find(function (c) {
          return (
            c &&
            c.email.toLowerCase() === data.email.toLowerCase() &&
            c.id !== editId
          );
        });
        if (dup)
          return (
            "A customer with this email already exists (" + dup.name + ")."
          );
        return null;
      }

      function validateInvoice(data) {
        if (!data.customerId) return "Please select a customer.";
        var custExists = (customers || []).find(function (c) {
          return c && c.id === data.customerId;
        });
        if (!custExists)
          return "Selected customer no longer exists. Please choose another.";
        if (!data.lineItems || data.lineItems.length === 0)
          return "Add at least one line item.";
        var hasDesc = data.lineItems.some(function (li) {
          return li && li.description;
        });
        if (!hasDesc) return "At least one line item must have a description.";
        if (data.total <= 0) return "Invoice total must be greater than $0.00.";
        if (data.dueDate && data.issueDate && data.dueDate < data.issueDate)
          return "Due date cannot be before the issue date.";
        return null;
      }

      function validateRepair(data) {
        if (!data.customerId) return "Please select a customer.";
        var custExists = (customers || []).find(function (c) {
          return c && c.id === data.customerId;
        });
        if (!custExists) return "Selected customer no longer exists.";
        if (!data.deviceType) return "Device type is required.";
        if (!data.issue) return "Issue description is required.";
        if (data.estimatedCost < 0) return "Estimated cost cannot be negative.";
        if (
          data.estimatedCompletion &&
          data.receivedDate &&
          data.estimatedCompletion < data.receivedDate
        )
          return "Estimated completion date cannot be before the received date.";
        return null;
      }

      function validatePart(data) {
        if (!data.partName) return "Part name is required.";
        if (data.qty < 1) return "Quantity must be at least 1.";
        if (data.unitCost < 0) return "Unit cost cannot be negative.";
        if (
          data.expectedDate &&
          data.orderedDate &&
          data.expectedDate < data.orderedDate
        )
          return "Expected date cannot be before the ordered date.";
        return null;
      }

      // ── INIT ──
      async function init() {
        var rawCustomers = await Storage.get("customers", []);
        var rawInvoices = await Storage.get("invoices", []);
        var rawRepairs = await Storage.get("repairs", []);
        var rawParts = await Storage.get("parts", []);
        var rawSettings = await Storage.get("settings", {});
        var rawInvCtr = await Storage.get("invoiceCounter", null);
        var rawRepCtr = await Storage.get("repairCounter", null);

        var hasExistingData =
          Array.isArray(rawCustomers) && rawCustomers.length > 0;

        if (hasExistingData) {
          // Sanitize every entry through its normalizer, drop null results
          customers = rawCustomers.map(normalizeCustomer).filter(Boolean);
          invoices = rawInvoices.map(normalizeInvoice).filter(Boolean);
          repairs = rawRepairs.map(normalizeRepair).filter(Boolean);
          parts = rawParts.map(normalizePart).filter(Boolean);
          settings = normalizeSettings(rawSettings);
          // Fix null/NaN counters — derive from existing data if needed
          invoiceCounter =
            rawInvCtr != null && !isNaN(parseInt(rawInvCtr))
              ? parseInt(rawInvCtr)
              : invoices.length > 0
                ? Math.max.apply(
                    null,
                    invoices.map(function (i) {
                      return (
                        parseInt((i.invoiceNumber || "0").replace(/\D/g, "")) ||
                        0
                      );
                    }),
                  ) + 1
                : 1;
          repairCounter =
            rawRepCtr != null && !isNaN(parseInt(rawRepCtr))
              ? parseInt(rawRepCtr)
              : repairs.length > 0
                ? Math.max.apply(
                    null,
                    repairs.map(function (r) {
                      return (
                        parseInt((r.repairNumber || "0").replace(/\D/g, "")) ||
                        0
                      );
                    }),
                  ) + 1
                : 1;
        } else {
          generateSampleData();
          await saveAll();
        }
        renderView(currentView);
        setupNav();
        setupMobileMenu();
      }

        await Storage.set("customers", customers);
        await Storage.set("invoices", invoices);
        await Storage.set("repairs", repairs);
        await Storage.set("parts", parts);
        await Storage.set("settings", settings);
        await Storage.set("invoiceCounter", invoiceCounter);
        await Storage.set("repairCounter", repairCounter);
      }

          var subtotal = 0,
            taxTotal = 0;
          lineItems.forEach(function (li) {
            li.lineTotal = (li.qty || 0) * (li.unitPrice || 0);
            subtotal += li.lineTotal;
            taxTotal += li.lineTotal * ((li.taxPct || 0) / 100);
          });
          return {
            subtotal: subtotal,
            taxTotal: taxTotal,
            total: subtotal + taxTotal,
          };
        }

        // Save handler — reads all values fresh from DOM at save time
        async function saveInvoice(statusOverride) {
          var customerEl = document.getElementById("if-customer-c1f2");
          var statusEl = document.getElementById("if-status-s1f2");
          var notesEl = document.getElementById("if-notes-n1f2");
          var termsEl = document.getElementById("if-terms-t1f2");
          var issueDateEl = document.getElementById("if-issue-date-d1f2");
          var dueDateEl = document.getElementById("if-due-date-d2f2");
          var ppEmailEl = document.getElementById("if-paypal-p1f2");
          var customerId = customerEl ? customerEl.value : "";
          var t = calcTotals();
          var draftData = {
            customerId: customerId,
            lineItems: lineItems,
            total: t.total,
            issueDate: issueDateEl ? issueDateEl.value : todayStr(),
            dueDate: dueDateEl ? dueDateEl.value : plus30(),
          };
          var invErr = validateInvoice(draftData);
          if (invErr) {
            if (!customerId && customerEl) customerEl.classList.add("error");
            showToast(invErr, "error");
            return;
          }
          var ppEmail = ppEmailEl ? ppEmailEl.value.trim() : "";
          var ppUsername = ppEmail.includes("@")
            ? ppEmail.split("@")[0]
            : ppEmail;
          var ppLink = ppEmail
            ? "https://www.paypal.com/paypalme/" +
              ppUsername +
              "/" +
              t.total.toFixed(2)
            : existing
              ? existing.paypalLink || ""
              : "";
          var now = todayStr();
          var data = {
            invoiceNumber: invNum,
            customerId: customerId,
            status: statusOverride || (statusEl ? statusEl.value : "draft"),
            issueDate: draftData.issueDate,
            dueDate: draftData.dueDate,
            lineItems: lineItems,
            subtotal: t.subtotal,
            taxTotal: t.taxTotal,
            total: t.total,
            notes: notesEl ? notesEl.value.trim() : "",
            paymentTerms: termsEl ? termsEl.value.trim() : "",
            paypalEmail: ppEmail,
            paypalLink: ppLink,
            updatedAt: now,
          };
          if (isEdit) {
            Object.assign(
              existing,
              normalizeInvoice(Object.assign({}, existing, data)),
            );
            showToast("Invoice updated!");
          } else {
            if (Array.isArray(invoices)) {
              invoices.push(
                normalizeInvoice(
                  Object.assign({ id: uid(), createdAt: now }, data),
                ),
              );
            }
            invoiceCounter++;
            showToast("Invoice created!");
          }

                r,
                normalizeRepair(
                  Object.assign({}, r, repData, { updatedAt: now }),
                ),
              );
              showToast("Repair updated successfully.");
            } else {
              if (Array.isArray(repairs)) {
                repairs.push(
                  normalizeRepair(
                    Object.assign(
                      {
                        id: uid(),
                        repairNumber: padRep(repairCounter),
                        createdAt: now,
                        updatedAt: now,
                      },
                      repData,
                    ),
                  ),
                );
              }
              repairCounter++;
              showToast("Repair logged successfully.");
            }
            await saveAll();
            closeModal();
            renderView("repairs");
          });
      }

      function confirmDeleteRepair(id) {
        var r = (repairs || []).find(function (x) {
          return x && x.id === id;
        });
        if (!r) return;
        openModal(
          '\
    <div style="padding:28px;text-align:center;">\
      <i data-lucide="alert-triangle" class="w-12 h-12" style="color:#f59e0b;margin:0 auto 16px;display:block;"></i>\
      <h2 style="font-size:18px;font-weight:700;color:#0f172a;margin:0 0 8px;">Delete Repair?</h2>\
      <p style="color:#64748b;font-size:14px;">Are you sure you want to delete <strong>' +
            (r.repairNumber || "this repair") +
            '</strong>?</p>\
      <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;">\
        <button class="btn-secondary" id="del-r-cancel">Cancel</button>\
        <button class="btn-primary" id="del-r-confirm" style="background:#ef4444;">Delete</button>\
      </div>\
    </div>\
  ',
          "sm",
        );
        if (
          typeof lucide !== "undefined" &&
          typeof lucide.createIcons === "function"
        )
          lucide.createIcons();
        var delCancel = document.getElementById("del-r-cancel");
        if (delCancel) delCancel.addEventListener("click", closeModal);
        var delConfirm = document.getElementById("del-r-confirm");
        if (delConfirm)
          delConfirm.addEventListener("click", async function () {
            repairs = (repairs || []).filter(function (x) {
              return x && x.id !== id;
            });
            await saveAll();
            closeModal();
            showToast("Repair deleted.");
            renderView("repairs");
          });
      }

      // ══════════════════════════════
      // ──  PARTS VIEW
      // ══════════════════════════════
      function renderParts(el) {
        setPageTitle("Parts Order");
        setHeaderActions(
          '<button class="btn-primary" id="add-part-btn"><i data-lucide="plus" class="w-4 h-4"></i> Order Part</button>',
        );
        if (
          typeof lucide !== "undefined" &&
          typeof lucide.createIcons === "function"
        )
          lucide.createIcons();
        var addBtn = document.getElementById("add-part-btn");
        if (addBtn)
          addBtn.addEventListener("click", function () {
            openPartModal();
          });

        var safeParts = parts || [];

        if (safeParts.length === 0) {
          el.innerHTML =
            '<div class="stat-card"><div class="empty-state"><i data-lucide="package" class="w-12 h-12"></i><p style="font-size:16px;font-weight:600;color:#334155;margin:8px 0 4px;">No parts orders yet</p><p style="font-size:14px;">Order your first part to get started.</p></div></div>';
          if (
            typeof lucide !== "undefined" &&
            typeof lucide.createIcons === "function"
          )
            lucide.createIcons();
          return;
        }

        var totalPartsOrdered = safeParts.length;
        var totalValue = safeParts.reduce(function (s, p) {
          return s + (p.qty || 0) * (p.unitCost || 0);
        }, 0);
        var receivedCount = safeParts.filter(function (p) {
          return p && p.status === "received";
        }).length;

        el.innerHTML =
          '\
    <div class="stat-card" style="padding:0;overflow:hidden;margin-bottom:20px;"><div style="overflow-x:auto;">\
      <table class="data-table">\
        <thead><tr><th>Part Name</th><th>Part #</th><th>Supplier</th><th style="text-align:right;">Qty</th><th style="text-align:right;">Unit Cost</th><th style="text-align:right;">Total Cost</th><th>Status</th><th>Ordered</th><th>Expected</th><th style="text-align:right;">Actions</th></tr></thead>\
        <tbody>' +
          safeParts
            .map(function (p) {
              return (
                '<tr>\
          <td style="font-weight:600;">' +
                (p.partName || "—") +
                '</td>\
          <td style="color:#64748b;">' +
                (p.partNumber || "—") +
                "</td>\
          <td>" +
                (p.supplier || "—") +
                '</td>\
          <td style="text-align:right;font-variant-numeric:tabular-nums;">' +
                (p.qty || 0) +
                '</td>\
          <td style="text-align:right;font-variant-numeric:tabular-nums;">' +
                fmtMoney(p.unitCost) +
                '</td>\
          <td style="text-align:right;font-weight:600;font-variant-numeric:tabular-nums;">' +
                fmtMoney((p.qty || 0) * (p.unitCost || 0)) +
                "</td>\
          <td>" +
                partStatusBadge(p.status) +
                '</td>\
          <td style="color:#64748b;">' +
                formatDate(p.orderedDate) +
                '</td>\
          <td style="color:#64748b;">' +
                formatDate(p.expectedDate) +
                '</td>\
          <td style="text-align:right;">\
            <div style="display:flex;gap:4px;justify-content:flex-end;">\
              <button class="action-btn part-edit" data-id="' +
                p.id +
                '" title="Edit"><i data-lucide="pencil" class="w-4 h-4"></i></button>\
              <button class="action-btn part-del" data-id="' +
                p.id +
                '" title="Delete" style="color:#dc2626;"><i data-lucide="trash-2" class="w-4 h-4"></i></button>\
            </div>\
          </td>\
        </tr>'
              );
            })
            .join("") +
          '</tbody>\
      </table>\
    </div></div>\
    <div class="stat-card">\
      <div style="display:flex;gap:32px;flex-wrap:wrap;">\
        <div>\
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;">Total Parts Ordered</span>\
          <div style="font-size:24px;font-weight:700;color:#0f172a;margin-top:4px;">' +
          totalPartsOrdered +
          '</div>\
        </div>\
        <div>\
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;">Total Value</span>\
          <div style="font-size:24px;font-weight:700;color:#0f172a;margin-top:4px;">' +
          fmtMoney(totalValue) +
          '</div>\
        </div>\
        <div>\
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;">Received</span>\
          <div style="font-size:24px;font-weight:700;color:#16a34a;margin-top:4px;">' +
          receivedCount +
          "</div>\
        </div>\
      </div>\
    </div>\
  ";
        if (
          typeof lucide !== "undefined" &&
          typeof lucide.createIcons === "function"
        )
          lucide.createIcons();
        el.querySelectorAll(".part-edit").forEach(function (b) {
          b.addEventListener("click", function () {
            openPartModal(b.dataset.id);
          });
        });
        el.querySelectorAll(".part-del").forEach(function (b) {
          b.addEventListener("click", function () {
            confirmDeletePart(b.dataset.id);
          });
        });
      }

      function openPartModal(editId) {
        var p = editId
          ? (parts || []).find(function (x) {
              return x && x.id === editId;
            })
          : null;
        var title = p ? "Edit Part Order" : "Order Part";
        openModal(
          '\
    <div style="padding:28px;">\
      <h2 style="font-size:18px;font-weight:700;color:#0f172a;margin:0 0 24px;">' +
            title +
            '</h2>\
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">\
        <div>\
          <label class="form-label">Part Name <span style="color:#ef4444;">*</span></label>\
          <input class="form-input" id="pf-name" value="' +
            (p ? p.partName : "") +
            '" placeholder="e.g. Display Assembly">\
        </div>\
        <div>\
          <label class="form-label">Part Number</label>\
          <input class="form-input" id="pf-number" value="' +
            (p ? p.partNumber : "") +
            '" placeholder="e.g. MBPD-14-2023">\
        </div>\
        <div>\
          <label class="form-label">Supplier</label>\
          <input class="form-input" id="pf-supplier" value="' +
            (p ? p.supplier : "") +
            '" placeholder="Supplier name">\
        </div>\
        <div>\
          <label class="form-label">Quantity</label>\
          <input class="form-input" id="pf-qty" type="number" min="1" step="1" value="' +
            (p ? p.qty : 1) +
            '">\
        </div>\
        <div>\
          <label class="form-label">Unit Cost ($)</label>\
          <input class="form-input" id="pf-cost" type="number" min="0" step="0.01" value="' +
            (p ? p.unitCost : 0) +
            '">\
        </div>\
        <div>\
          <label class="form-label">Status</label>\
          <select class="form-input" id="pf-status">\
            <option value="ordered" ' +
            (!p || (p && p.status === "ordered") ? "selected" : "") +
            '>Ordered</option>\
            <option value="in-transit" ' +
            (p && p.status === "in-transit" ? "selected" : "") +
            '>In Transit</option>\
            <option value="received" ' +
            (p && p.status === "received" ? "selected" : "") +
            '>Received</option>\
            <option value="cancelled" ' +
            (p && p.status === "cancelled" ? "selected" : "") +
            '>Cancelled</option>\
          </select>\
        </div>\
        <div>\
          <label class="form-label">Ordered Date</label>\
          <input type="date" class="form-input" id="pf-ordered" value="' +
            (p ? p.orderedDate : todayStr()) +
            '">\
        </div>\
        <div>\
          <label class="form-label">Expected Date</label>\
          <input type="date" class="form-input" id="pf-expected" value="' +
            (p ? p.expectedDate : plus30()) +
            '">\
        </div>\
        <div style="grid-column:1/-1;">\
          <label class="form-label">Notes</label>\
          <textarea class="form-input" id="pf-notes" placeholder="Additional notes...">' +
            (p ? p.notes || "" : "") +
            '</textarea>\
        </div>\
      </div>\
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;">\
        <button class="btn-secondary" id="pf-cancel">Cancel</button>\
        <button class="btn-primary" id="pf-save">Save Part</button>\
      </div>\
    </div>\
  ',
          "sm",
        );
        var cancelBtn = document.getElementById("pf-cancel");
        if (cancelBtn) cancelBtn.addEventListener("click", closeModal);
        var saveBtn = document.getElementById("pf-save");
        if (saveBtn)
          saveBtn.addEventListener("click", async function () {
            var nameEl = document.getElementById("pf-name");
            var partName = nameEl ? nameEl.value.trim() : "";

            var partData = {
              partName: partName,
              partNumber: (
                document.getElementById("pf-number") || { value: "" }
              ).value.trim(),
              supplier: (
                document.getElementById("pf-supplier") || { value: "" }
              ).value.trim(),
              qty: document.getElementById("pf-qty")
                ? parseInt(document.getElementById("pf-qty").value) || 1
                : 1,
              unitCost: document.getElementById("pf-cost")
                ? parseFloat(document.getElementById("pf-cost").value) || 0
                : 0,
              status: document.getElementById("pf-status")
                ? document.getElementById("pf-status").value
                : "ordered",
              orderedDate: document.getElementById("pf-ordered")
                ? document.getElementById("pf-ordered").value
                : todayStr(),
              expectedDate: document.getElementById("pf-expected")
                ? document.getElementById("pf-expected").value
                : plus30(),
              notes: document.getElementById("pf-notes")
                ? document.getElementById("pf-notes").value.trim()
                : "",
              repairId: p ? p.repairId : "",
            };
            var partErr = validatePart(partData);
            if (partErr) {
              if (!partData.partName && nameEl) nameEl.classList.add("error");
              showToast(partErr, "error");
              return;
            }
            var now = todayStr();
            if (p) {
              Object.assign(
                p,
                normalizePart(
                  Object.assign({}, p, partData, { updatedAt: now }),
                ),
              );
              showToast("Part order updated.");
            } else {
              if (Array.isArray(parts)) {
                parts.push(
                  normalizePart(
                    Object.assign(
                      { id: uid(), createdAt: now, updatedAt: now },
                      partData,
                    ),
                  ),
                );
              }
              showToast("Part ordered successfully.");
            }
            await saveAll();
            closeModal();
            renderView("parts");
          });
      }

      function confirmDeletePart(id) {
        var p = (parts || []).find(function (x) {
          return x && x.id === id;
        });
        if (!p) return;
        openModal(
          '\
    <div style="padding:28px;text-align:center;">\
      <i data-lucide="alert-triangle" class="w-12 h-12" style="color:#f59e0b;margin:0 auto 16px;display:block;"></i>\
      <h2 style="font-size:18px;font-weight:700;color:#0f172a;margin:0 0 8px;">Delete Part Order?</h2>\
      <p style="color:#64748b;font-size:14px;">Are you sure you want to delete <strong>' +
            (p.partName || "this part") +
            '</strong>?</p>\
      <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;">\
        <button class="btn-secondary" id="del-p-cancel">Cancel</button>\
        <button class="btn-primary" id="del-p-confirm" style="background:#ef4444;">Delete</button>\
      </div>\
    </div>\
  ',
          "sm",
        );
        if (
          typeof lucide !== "undefined" &&
          typeof lucide.createIcons === "function"
        )
          lucide.createIcons();
        var delCancel = document.getElementById("del-p-cancel");
        if (delCancel) delCancel.addEventListener("click", closeModal);
        var delConfirm = document.getElementById("del-p-confirm");
        if (delConfirm)
          delConfirm.addEventListener("click", async function () {
            parts = (parts || []).filter(function (x) {
              return x && x.id !== id;
            });
            await saveAll();
            closeModal();
            showToast("Part order deleted.");
            renderView("parts");
          });
      }

      // ══════════════════════════════
      // ──  SETTINGS VIEW
      // ══════════════════════════════
      function renderSettings(el) {
        setPageTitle("Settings");
        setHeaderActions("");
        el.innerHTML =
          '\
    <div class="stat-card" style="max-width:720px;">\
      <h3 style="font-size:16px;font-weight:700;color:#0f172a;margin:0 0 24px;">Business Information</h3>\
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">\
        <div>\
          <label class="form-label">Business Name</label>\
          <input class="form-input" id="set-bname-b1s2" value="' +
          (settings.businessName || "") +
          '" placeholder="Your Business Name">\
        </div>\
        <div>\
          <label class="form-label">Business Email</label>\
          <input class="form-input" id="set-bemail-e1s2" type="email" value="' +
          (settings.businessEmail || "") +
          '" placeholder="info@business.com">\
        </div>\
        <div>\
          <label class="form-label">Business Phone</label>\
          <input class="form-input" id="set-bphone-p1s2" value="' +
          (settings.businessPhone || "") +
          '" placeholder="(555) 000-0000">\
        </div>\
        <div>\
          <label class="form-label">PayPal Username</label>\
          <input class="form-input" id="set-ppuser-u1s2" value="' +
          (settings.paypalUsername || "") +
          '" placeholder="PayPal.me username">\
        </div>\
      </div>\
      <div style="margin-top:16px;">\
        <label class="form-label">Business Address</label>\
        <textarea class="form-input" id="set-baddr-a1s2" placeholder="Street, City, State ZIP">' +
          (settings.businessAddress || "") +
          '</textarea>\
      </div>\
      <div style="margin-top:28px;padding-top:24px;border-top:1px solid #e2e8f0;">\
        <h3 style="font-size:16px;font-weight:700;color:#0f172a;margin:0 0 20px;">Invoice Defaults</h3>\
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">\
          <div>\
            <label class="form-label">Default Tax Rate (%)</label>\
            <input class="form-input" id="set-taxrate-t1s2" type="number" min="0" step="0.5" value="' +
          (settings.defaultTaxRate || 0) +
          '" placeholder="0">\
          </div>\
          <div></div>\
        </div>\
        <div style="margin-top:16px;">\
          <label class="form-label">Default Payment Terms</label>\
          <textarea class="form-input" id="set-pterms-p2s2">' +
          (settings.defaultPaymentTerms || "Payment due within 30 days") +
          '</textarea>\
        </div>\
      </div>\
      <div style="margin-top:28px;padding-top:24px;border-top:1px solid #e2e8f0;">\
        <h3 style="font-size:16px;font-weight:700;color:#0f172a;margin:0 0 12px;">Logo</h3>\
        <div style="width:120px;height:120px;border-radius:16px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#94a3b8;">\
          <i data-lucide="image" class="w-8 h-8"></i>\
        </div>\
        <p style="font-size:12px;color:#94a3b8;margin-top:8px;">Logo support coming soon.</p>\
      </div>\
      <div style="display:flex;justify-content:flex-end;margin-top:28px;">\
        <button class="btn-primary" id="set-save-s1b2"><i data-lucide="save" class="w-4 h-4"></i> Save Settings</button>\
      </div>\
    </div>\
  ';
        if (
          typeof lucide !== "undefined" &&
          typeof lucide.createIcons === "function"
        )
          lucide.createIcons();
        var saveBtn = document.getElementById("set-save-s1b2");
        if (saveBtn)
          saveBtn.addEventListener("click", async function () {
            var raw = {
              businessName: (
                document.getElementById("set-bname-b1s2") || { value: "" }
              ).value,
              businessEmail: (
                document.getElementById("set-bemail-e1s2") || { value: "" }
              ).value,
              businessPhone: (
                document.getElementById("set-bphone-p1s2") || { value: "" }
              ).value,
              businessAddress: (
                document.getElementById("set-baddr-a1s2") || { value: "" }
              ).value,
              paypalUsername: (
                document.getElementById("set-ppuser-u1s2") || { value: "" }
              ).value,
              defaultTaxRate:
                parseFloat(
                  (
                    document.getElementById("set-taxrate-t1s2") || {
                      value: "0",
                    }
                  ).value,
                ) || 0,
              defaultPaymentTerms: (
                document.getElementById("set-pterms-p2s2") || { value: "" }
              ).value,
            };
            settings = normalizeSettings(raw);
            await saveAll();
            showToast("Settings saved!");
          });
      }

      // ── KICK OFF ──
      init();

      document.addEventListener("DOMContentLoaded", function () {
        if (
          typeof lucide !== "undefined" &&
          typeof lucide.createIcons === "function"
        )
          lucide.createIcons();
      });
    </script>
  </body>
</html>
